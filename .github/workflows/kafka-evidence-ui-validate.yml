name: Validate KAFKA Evidence UI

on:
  pull_request:
    paths:
      - "design-systems/kafka/**"
      - "plugins/kafka-evidence-ui/**"
      - "skills/kafka-evidence-ui/**"
      - ".agents/skills/kafka-evidence-ui/**"
      - ".agents/plugins/marketplace.json"
      - ".claude-plugin/marketplace.json"
      - "README.md"
      - ".github/workflows/kafka-evidence-ui-*.yml"
  push:
    branches: [main]
    paths:
      - "design-systems/kafka/**"
      - "plugins/kafka-evidence-ui/**"
      - "skills/kafka-evidence-ui/**"
      - ".agents/skills/kafka-evidence-ui/**"
      - ".agents/plugins/marketplace.json"
      - ".claude-plugin/marketplace.json"
      - "README.md"
      - ".github/workflows/kafka-evidence-ui-*.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON manifests
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          paths = [
              Path('.claude-plugin/marketplace.json'),
              Path('.agents/plugins/marketplace.json'),
              Path('plugins/kafka-evidence-ui/.claude-plugin/plugin.json'),
              Path('plugins/kafka-evidence-ui/.codex-plugin/plugin.json'),
          ]
          for path in paths:
              with path.open(encoding='utf-8') as handle:
                  json.load(handle)
              print(f'valid json: {path}')
          PY

      - name: Validate required skill assets
        run: |
          python - <<'PY'
          from pathlib import Path

          required = [
              '.agents/skills/kafka-evidence-ui/SKILL.md',
              '.agents/skills/kafka-evidence-ui/assets/tokens.css',
              '.agents/skills/kafka-evidence-ui/assets/components.css',
              'skills/kafka-evidence-ui/SKILL.md',
              'skills/kafka-evidence-ui/assets/tokens.css',
              'skills/kafka-evidence-ui/assets/components.css',
              'plugins/kafka-evidence-ui/skills/kafka-evidence-ui/SKILL.md',
              'plugins/kafka-evidence-ui/skills/kafka-evidence-ui/assets/tokens.css',
              'plugins/kafka-evidence-ui/skills/kafka-evidence-ui/assets/components.css',
          ]
          missing = [path for path in required if not Path(path).is_file()]
          if missing:
              raise SystemExit(f'missing required files: {missing}')
          print(f'required files: {len(required)}')
          PY

      - name: Validate README resource links
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md').read_text(encoding='utf-8')
          required_links = [
              'https://kafka2306.github.io/agent-resources/',
              '(skills/kafka-evidence-ui/SKILL.md)',
              '(plugins/kafka-evidence-ui/README.md)',
          ]
          missing = [link for link in required_links if link not in readme]
          if missing:
              raise SystemExit(f'missing README links: {missing}')
          for path in ('skills/kafka-evidence-ui/SKILL.md', 'plugins/kafka-evidence-ui/README.md'):
              if not Path(path).is_file():
                  raise SystemExit(f'missing linked file: {path}')
          print('README resource links: valid')
          PY

      - name: Validate JavaScript syntax
        run: node --check design-systems/kafka/app.js

      - name: Validate HTML and relative assets
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.refs = []
              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  for key in ('href', 'src'):
                      value = values.get(key)
                      if value and not value.startswith(('http://', 'https://', '#', 'mailto:')):
                          self.refs.append(value)

          root = Path('design-systems/kafka')
          parser = Parser()
          parser.feed((root / 'index.html').read_text(encoding='utf-8'))
          missing = [ref for ref in parser.refs if not (root / ref).is_file()]
          if missing:
              raise SystemExit(f'missing relative assets: {missing}')
          print(f'html references: {parser.refs}')
          PY

      - name: Validate CSS brace balance
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = list(Path('design-systems/kafka').glob('*.css'))
          paths += list(Path('plugins/kafka-evidence-ui').rglob('*.css'))
          paths += list(Path('skills/kafka-evidence-ui').rglob('*.css'))
          paths += list(Path('.agents/skills/kafka-evidence-ui').rglob('*.css'))
          for path in paths:
              text = path.read_text(encoding='utf-8')
              if text.count('{') != text.count('}'):
                  raise SystemExit(f'unbalanced braces: {path}')
          print(f'css files checked: {len(paths)}')
          PY
